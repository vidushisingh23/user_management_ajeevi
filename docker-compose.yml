version: "3.9"

services:

  frontend:
    build: .
    container_name: user_management_frontend
    ports:
      - "8080:80"

  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: user_management_db
    environment:
      SA_PASSWORD: "Password123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1434:1433"